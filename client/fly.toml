app = 'greenhouse-iot-client'
primary_region = 'fra'

[build]
dockerfile = "Dockerfile"
[build.args]
VITE_API_URL = "https://greenhouse-iot-api.fly.dev"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0

[[vm]]
memory = '256mb'
cpus = 1